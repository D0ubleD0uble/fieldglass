# pre-commit framework config — orchestrates fast checks on `git commit`
# and slower ones on `git push`. Install once per clone:
#
#     pre-commit install --hook-type pre-commit --hook-type pre-push
#
# (npm install at the repo root does this automatically via the prepare hook.)

default_install_hook_types: [pre-commit, pre-push]
default_stages: [pre-commit]
fail_fast: false

repos:
  # ─── Workspace tooling — reuses the user's installed cargo / npm / semgrep
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt --check
        language: system
        types: [rust]
        entry: cargo fmt --all -- --check
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy --all-targets -- -D warnings
        language: system
        types: [rust]
        entry: cargo clippy --all-targets --workspace -- -D warnings
        pass_filenames: false

      - id: cargo-clippy-core-no-default
        name: cargo clippy -p fieldglass-core --no-default-features -- -D warnings
        language: system
        types: [rust]
        # Guards the gated build: `render` off must still compile clean so the
        # parsing-only surface the format crates consume can't rot.
        entry: cargo clippy -p fieldglass-core --no-default-features --all-targets -- -D warnings
        pass_filenames: false

      - id: cargo-clippy-format-crates-render-off
        name: cargo clippy (format crates against render-off core)
        language: system
        types: [rust]
        # The real #227 backstop. Selecting only the format crates keeps
        # fieldglass-napi (the sole `render` consumer) out of the build graph, so
        # core resolves with `default-features = false` and `render` OFF. A
        # format crate that reaches into a gated `warp`/`overlay`/`colormap`
        # symbol fails here — a `--workspace` build would hide it, since napi's
        # `render` request unifies the feature back on for everyone.
        entry: cargo clippy -p fieldglass-grib1 -p fieldglass-grib2 -p fieldglass-netcdf --all-targets -- -D warnings
        pass_filenames: false

      - id: tsc-extension
        name: tsc --noEmit (extension)
        language: system
        files: ^extension/(src/.*\.ts|tsconfig\.json|package\.json)$
        entry: bash -c 'cd extension && npx --no-install tsc --noEmit'
        pass_filenames: false

      - id: eslint-extension
        name: eslint (extension)
        language: system
        files: ^extension/(src/.*\.ts|eslint\.config\.mjs|package\.json)$
        entry: bash -c 'cd extension && npx --no-install eslint .'
        pass_filenames: false

      - id: architecture-diagrams
        name: architecture diagrams in sync with source
        language: system
        files: ^(crates/.*\.rs|crates/.*/Cargo\.toml|docs/architecture/.*\.md|tools/check_architecture_diagrams\.py)$
        entry: python3 tools/check_architecture_diagrams.py
        pass_filenames: false

      # ── Pre-push (slower) hooks
      - id: architecture-diagrams-selftest
        name: architecture diagram checker self-test
        stages: [pre-push]
        language: system
        files: ^tools/(check_architecture_diagrams|test_check_architecture_diagrams)\.py$
        entry: python3 tools/test_check_architecture_diagrams.py
        pass_filenames: false

      - id: cargo-test
        name: cargo test --workspace
        stages: [pre-push]
        language: system
        entry: cargo test --workspace
        pass_filenames: false

      - id: cargo-test-core-no-default
        name: cargo test -p fieldglass-core --no-default-features
        stages: [pre-push]
        language: system
        entry: cargo test -p fieldglass-core --no-default-features
        pass_filenames: false

      - id: cargo-deny
        name: cargo deny check
        stages: [pre-push]
        language: system
        # `--locked` keeps cargo-deny from refreshing the registry index or
        # rewriting Cargo.lock under the hood (which the pre-commit framework
        # would interpret as "files were modified by this hook" and fail the
        # push, even though the underlying advisory/license check is OK).
        entry: cargo deny --locked check
        pass_filenames: false

      - id: npm-audit-extension
        name: npm audit --omit=dev (extension)
        stages: [pre-push]
        language: system
        entry: bash -c 'cd extension && npm audit --omit=dev || echo "npm audit reported issues — review with npm audit"'
        pass_filenames: false

      - id: npm-audit-root
        name: npm audit --omit=dev (root)
        stages: [pre-push]
        language: system
        entry: bash -c 'npm audit --omit=dev || echo "npm audit reported issues at the workspace root — review with npm audit"'
        pass_filenames: false

  # ─── Auto-fetched pinned binaries — no manual install required
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      - id: check-json
        exclude: ^extension/tsconfig\.json$   # tsconfig.json allows comments; check-json doesn't
      - id: check-toml
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: check-added-large-files
        args: [--maxkb=2048]                  # block accidentally-staged big binaries

  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.10.0
    hooks:
      - id: shellcheck

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.7
    hooks:
      - id: actionlint

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # Semgrep auto-installs into an isolated python env — no manual install.
  - repo: https://github.com/semgrep/semgrep
    rev: v1.162.0
    hooks:
      - id: semgrep
        stages: [pre-push]
        pass_filenames: false
        args:
          - scan
          - --quiet
          - --severity=ERROR
          - --error
          - --config=p/default
          - --config=p/security-audit
          - --config=p/owasp-top-ten
          - --config=p/rust
          - --config=p/typescript
          - --config=p/secrets
          - --config=p/github-actions
