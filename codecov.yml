# Codecov configuration. See https://docs.codecov.com/docs/codecov-yaml for
# the full schema.

coverage:
  range: 60..90
  round: down
  precision: 1

  status:
    # Project-wide coverage. `auto` means "compare against the previous
    # commit on the same branch"; threshold 1% allows small dips without
    # failing the check (tests for stub crates can shift overall percent
    # noticeably while real coverage holds).
    project:
      default:
        target: auto
        threshold: 1%
        if_ci_failed: error
    # Patch coverage — the diff in this PR.
    patch:
      default:
        target: 70%
        threshold: 5%
        if_ci_failed: error

comment:
  layout: "diff, flags, files"
  behavior: default
  require_changes: false

flag_management:
  default_rules:
    carryforward: true
  individual_flags:
    - name: rust
      paths:
        - crates/

# `**/tests/**` is excluded because integration-test files exist to exercise
# library code; counting their own lines as "uncovered" would dilute the
# real signal. The grib2 stub exclusion has been lifted now that the crate
# carries a real, tested Indicator-Section implementation. The netcdf stub
# exclusion will be lifted in a follow-up so the coverage delta from that
# crate doesn't get bundled with unrelated work.
ignore:
  - "crates/fieldglass-netcdf/src/**"
  - "**/tests/**"
