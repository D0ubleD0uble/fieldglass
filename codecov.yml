# Codecov configuration. See https://docs.codecov.com/docs/codecov-yaml for
# the full schema.

coverage:
  range: 60..90
  round: down
  precision: 1

  status:
    # Project-wide coverage. `auto` means "compare against the previous
    # commit on the same branch"; threshold 1% allows small dips without
    # failing the check (tests for stub crates can shift overall percent
    # noticeably while real coverage holds).
    project:
      default:
        target: auto
        threshold: 1%
        if_ci_failed: error
    # Patch coverage — the diff in this PR.
    patch:
      default:
        target: 70%
        threshold: 5%
        if_ci_failed: error

comment:
  layout: "diff, flags, files"
  behavior: default
  require_changes: false

flag_management:
  default_rules:
    carryforward: true
  individual_flags:
    - name: rust
      paths:
        - crates/

# Exclusions:
#  - `**/tests/**`: integration-test files exist to exercise library code;
#    counting their own lines as "uncovered" would dilute the real signal.
#  - `crates/fieldglass-napi/src/**`: thin FFI shim — every function takes
#    a `napi::Buffer` and returns napi-typed errors / objects, so it can
#    only be exercised from a Node embedding. The JS side is what should
#    be covered; Rust-side coverage of this crate would be permanently 0%.
#  - `crates/fieldglass-netcdf/src/**`: stub-exclusion to be lifted in a
#    follow-up; pulling it now would bundle an unrelated coverage delta
#    with this PR.
ignore:
  - "crates/fieldglass-napi/src/**"
  - "crates/fieldglass-netcdf/src/**"
  - "**/tests/**"
