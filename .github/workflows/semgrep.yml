name: Semgrep

on:
  push:
    branches: [master]
  pull_request:
  schedule:
    # Weekly Mon 06:00 UTC — catches new rules added to the rule packs.
    - cron: '0 6 * * 1'

permissions:
  contents: read
  security-events: write   # to upload SARIF to the Security tab
  pull-requests: read

jobs:
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    # SARIF upload to GitHub Code Scanning needs either a public repo or
    # GitHub Advanced Security. Skip until the repo is public.
    if: github.event.repository.visibility == 'public'
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run Semgrep
        # No --error: surface findings in the Security tab without breaking
        # the build until we've triaged. Flip on --error once findings are
        # at zero.
        run: |
          semgrep scan \
            --sarif --output=semgrep.sarif \
            --config p/default \
            --config p/security-audit \
            --config p/owasp-top-ten \
            --config p/rust \
            --config p/typescript \
            --config p/secrets \
            --config p/github-actions

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: semgrep.sarif
          category: semgrep
