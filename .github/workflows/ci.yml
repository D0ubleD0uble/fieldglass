name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build-native:
    name: Build native (linux-x64 smoke test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install napi-rs CLI
        run: npm install

      - name: Build native module
        run: npx napi build --platform --release --target x86_64-unknown-linux-gnu --output-dir ${{ github.workspace }}/extension/bin
        working-directory: crates/fieldglass-napi

      - name: Verify artifact exists
        run: test -f extension/bin/fieldglass.linux-x64-gnu.node

  build-extension:
    name: Build extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install
        working-directory: extension

      - name: Compile TypeScript
        run: npm run compile
        working-directory: extension
