name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  pre-commit:
    name: Lint + test via pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Install extension deps (for tsc + npm audit hooks)
        run: npm ci
        working-directory: extension

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: Set up Python (for pre-commit)
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit (commit-stage hooks)
        run: pre-commit run --all-files --show-diff-on-failure

      - name: Run pre-commit (push-stage hooks)
        run: pre-commit run --all-files --hook-stage pre-push --show-diff-on-failure

  build-extension:
    name: Build extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            extension/package-lock.json

      - name: Install root deps (napi-rs CLI)
        run: npm ci

      - name: Install extension deps
        run: npm ci
        working-directory: extension

      - name: Compile TypeScript
        run: npm run compile
        working-directory: extension

      - name: Build native module
        run: npx napi build --platform --release --target x86_64-unknown-linux-gnu --output-dir ${{ github.workspace }}/extension/bin
        working-directory: crates/fieldglass-napi

      - name: Verify native artifact exists
        run: test -f extension/bin/fieldglass.linux-x64-gnu.node

      - name: Run extension tests (mocha + @vscode/test-electron, under xvfb)
        run: xvfb-run -a npm test
        working-directory: extension
