name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  pre-commit:
    name: Lint + test via pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Cache cargo build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Install extension deps (for tsc + npm audit hooks)
        run: npm ci
        working-directory: extension

      - name: Install cargo-deny
        uses: taiki-e/install-action@16b05812d776ae1dfaabc8277e421fb6d2506419 # v2.82.7
        with:
          tool: cargo-deny

      - name: Set up Python (for pre-commit)
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit (commit-stage hooks)
        run: pre-commit run --all-files --show-diff-on-failure

      - name: Run pre-commit (push-stage hooks)
        run: pre-commit run --all-files --hook-stage pre-push --show-diff-on-failure

  build-extension:
    name: Build extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            extension/package-lock.json

      - name: Install root deps (napi-rs CLI)
        run: npm ci

      - name: Install extension deps
        run: npm ci
        working-directory: extension

      - name: Compile TypeScript
        run: npm run compile
        working-directory: extension

      - name: Build native module
        run: npx napi build --platform --release --target x86_64-unknown-linux-gnu --output-dir ${{ github.workspace }}/extension/bin
        working-directory: crates/fieldglass-napi

      - name: Verify native artifact exists
        run: test -f extension/bin/fieldglass.linux-x64-gnu.node

      - name: Run extension tests (mocha + @vscode/test-electron, under xvfb)
        run: xvfb-run -a npm test
        working-directory: extension
