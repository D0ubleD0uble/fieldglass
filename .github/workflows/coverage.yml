name: Coverage

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read
  # Required so codecov-action can mint an OIDC token for tokenless upload.
  id-token: write

jobs:
  rust-coverage:
    name: Rust coverage (cargo llvm-cov → Codecov)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@2ca9b94c269419b7b0c711c09d0b21c4e1d51145 # v2.83.1
        with:
          tool: cargo-llvm-cov

      - name: Generate coverage report
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info

      - name: Upload to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: lcov.info
          flags: rust
          # OIDC is issued for trusted runs (push, same-repo PRs); forked PRs
          # fall back to Codecov's tokenless heuristic, which can refuse the
          # upload. Keep fail_ci_if_error off so a forked-PR coverage failure
          # doesn't block contributors.
          use_oidc: true
          fail_ci_if_error: false
