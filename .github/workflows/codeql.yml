name: CodeQL

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    # Weekly Mon 06:30 UTC.
    - cron: '30 6 * * 1'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # CodeQL on private repos requires GitHub Advanced Security. Skip
    # until the repo is public; the workflow flips itself on automatically
    # when visibility changes.
    if: github.event.repository.visibility == 'public'
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none
          # CodeQL's Rust extractor uses cargo metadata directly and only
          # supports build-mode: none. autobuild is unsupported and the
          # CodeQL CLI rejects it at `database init` with exit code 2.
          - language: rust
            build-mode: none

    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-extended

      - name: Perform analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
