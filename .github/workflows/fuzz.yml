name: Fuzz

on:
  push:
    branches: [master]
    paths:
      - 'crates/fieldglass-grib1/**'
      - 'crates/fieldglass-grib2/**'
      - 'crates/fieldglass-netcdf/**'
      - '.github/workflows/fuzz.yml'
  pull_request:
    paths:
      - 'crates/fieldglass-grib1/**'
      - 'crates/fieldglass-grib2/**'
      - 'crates/fieldglass-netcdf/**'
      - '.github/workflows/fuzz.yml'

permissions:
  contents: read

jobs:
  grib1-decode:
    name: GRIB1 decode (cargo-fuzz, time-boxed)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # cargo-fuzz needs the nightly libFuzzer sanitizer runtime; this is the
      # only job in the repo that builds on nightly. The normal gates stay on
      # stable — the fuzz crate is excluded from the workspace so they never
      # touch it.
      - name: Set up Rust nightly
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: nightly
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: crates/fieldglass-grib1/fuzz

      - name: Install cargo-fuzz
        uses: taiki-e/install-action@2ca9b94c269419b7b0c711c09d0b21c4e1d51145 # v2.83.1
        with:
          tool: cargo-fuzz

      # Time-boxed run seeded by the committed corpus (the GRIB1 test
      # fixtures). Not the normal `cargo test` gate — this is a bounded smoke
      # fuzz that asserts the decode path neither panics nor hangs.
      #
      # `--target` is pinned to the gnu host: left to its default, cargo-fuzz
      # selects the musl target on the hosted runner, which can't link the
      # ASan runtime against a static libc.
      - name: Fuzz the GRIB1 decode path
        run: cargo fuzz run decode --target x86_64-unknown-linux-gnu -- -max_total_time=120 -timeout=10
        working-directory: crates/fieldglass-grib1/fuzz

  grib2-decode:
    name: GRIB2 decode (cargo-fuzz, time-boxed)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # cargo-fuzz needs the nightly libFuzzer sanitizer runtime; the normal
      # gates stay on stable — the fuzz crate is excluded from the workspace so
      # they never touch it.
      - name: Set up Rust nightly
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: nightly
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: crates/fieldglass-grib2/fuzz

      - name: Install cargo-fuzz
        uses: taiki-e/install-action@2ca9b94c269419b7b0c711c09d0b21c4e1d51145 # v2.83.1
        with:
          tool: cargo-fuzz

      # Time-boxed run seeded by the committed corpus (the GRIB2 test
      # fixtures). Not the normal `cargo test` gate — this is a bounded smoke
      # fuzz that asserts the decode path neither panics nor hangs.
      #
      # `--target` is pinned to the gnu host: left to its default, cargo-fuzz
      # selects the musl target on the hosted runner, which can't link the
      # ASan runtime against a static libc.
      - name: Fuzz the GRIB2 decode path
        run: cargo fuzz run decode --target x86_64-unknown-linux-gnu -- -max_total_time=120 -timeout=10
        working-directory: crates/fieldglass-grib2/fuzz

  netcdf-parse:
    name: NetCDF parse (cargo-fuzz, time-boxed)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # cargo-fuzz needs the nightly libFuzzer sanitizer runtime; the normal
      # gates stay on stable — the fuzz crate is excluded from the workspace so
      # they never touch it.
      - name: Set up Rust nightly
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: nightly
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: crates/fieldglass-netcdf/fuzz

      - name: Install cargo-fuzz
        uses: taiki-e/install-action@2ca9b94c269419b7b0c711c09d0b21c4e1d51145 # v2.83.1
        with:
          tool: cargo-fuzz

      # Time-boxed run seeded by the committed corpus (the NetCDF test
      # fixtures). Not the normal `cargo test` gate — this is a bounded smoke
      # fuzz that asserts the header parse path neither panics nor hangs.
      #
      # `--target` is pinned to the gnu host: left to its default, cargo-fuzz
      # selects the musl target on the hosted runner, which can't link the
      # ASan runtime against a static libc.
      - name: Fuzz the NetCDF parse path
        run: cargo fuzz run parse --target x86_64-unknown-linux-gnu -- -max_total_time=120 -timeout=10
        working-directory: crates/fieldglass-netcdf/fuzz
