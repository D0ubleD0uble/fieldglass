name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    # Manual trigger for dry-run smoke tests of the build + package matrix.
    # The publish + GitHub Release jobs are gated on a tag ref, so manual
    # runs build artefacts and stop short of touching the Marketplace.

permissions:
  contents: read

jobs:
  channel:
    name: Determine release channel
    runs-on: ubuntu-latest
    # Marketplace convention: odd minor → pre-release channel, even minor →
    # stable. Derived from the tag here so the package/publish/release steps
    # don't hardcode a channel. workflow_dispatch dry-runs (no tag) default to
    # pre-release; their publish job is gated off anyway.
    outputs:
      prerelease: ${{ steps.detect.outputs.prerelease }}
    steps:
      - name: Detect channel from tag minor parity
        id: detect
        run: |
          set -euo pipefail
          ref="${GITHUB_REF_NAME}"
          prerelease=true
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "$ref" =~ ^v[0-9]+\.([0-9]+)\. ]]; then
            minor="${BASH_REMATCH[1]}"
            # 10# forces base-10 so a minor like 08 isn't read as octal.
            if (( 10#$minor % 2 == 0 )); then
              prerelease=false
            fi
          fi
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"
          echo "Release channel for ref '$ref': prerelease=$prerelease"

  build-native:
    name: Build native (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: fieldglass.linux-x64-gnu.node
            vsce_target: linux-x64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: fieldglass.linux-arm64-gnu.node
            vsce_target: linux-arm64
          - os: windows-2025-vs2026
            target: x86_64-pc-windows-msvc
            artifact: fieldglass.win32-x64-msvc.node
            vsce_target: win32-x64
          - os: windows-2025-vs2026
            target: aarch64-pc-windows-msvc
            artifact: fieldglass.win32-arm64-msvc.node
            vsce_target: win32-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: fieldglass.darwin-x64.node
            vsce_target: darwin-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: fieldglass.darwin-arm64.node
            vsce_target: darwin-arm64

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Cache cargo build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: ${{ matrix.target }}

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install aarch64 Linux cross-linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install napi-rs CLI
        run: npm ci

      - name: Build native module
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: npx napi build --platform --release --target ${{ matrix.target }} --output-dir ${{ github.workspace }}/extension/bin
        working-directory: crates/fieldglass-napi

      - name: Upload native artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: native-${{ matrix.vsce_target }}
          path: extension/bin/${{ matrix.artifact }}
          if-no-files-found: error

  package:
    name: Package .vsix (${{ matrix.vsce_target }})
    needs: [build-native, channel]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        vsce_target:
          - linux-x64
          - linux-arm64
          - win32-x64
          - win32-arm64
          - darwin-x64
          - darwin-arm64
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Download native artifact for this target
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: native-${{ matrix.vsce_target }}
          path: extension/bin

      - name: Install extension dependencies
        run: npm ci
        working-directory: extension

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Package extension (--target ${{ matrix.vsce_target }})
        run: |
          mkdir -p ${{ github.workspace }}/dist
          vsce package \
            --target ${{ matrix.vsce_target }} \
            ${{ needs.channel.outputs.prerelease == 'true' && '--pre-release' || '' }} \
            --no-dependencies \
            --out ${{ github.workspace }}/dist/
        working-directory: extension

      - name: Upload .vsix
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vsix-${{ matrix.vsce_target }}
          path: dist/*.vsix
          if-no-files-found: error

  publish:
    name: Publish to Marketplace + GitHub Release
    needs: [package, channel]
    # Manual workflow_dispatch runs only build+package (dry run); only pushed
    # tags trigger the actual publish + release.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Download all .vsix artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: vsix-*
          path: dist
          merge-multiple: true

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Publish to VS Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          set -euo pipefail
          args=()
          for vsix in dist/*.vsix; do
            args+=(--packagePath "$vsix")
          done
          vsce publish ${{ needs.channel.outputs.prerelease == 'true' && '--pre-release' || '' }} "${args[@]}"

      # Use the curated CHANGELOG section for this version as the release body,
      # not GitHub's auto-generated commit list. The tag is vX.Y.Z; the
      # matching heading is "## [X.Y.Z]".
      - name: Extract release notes from CHANGELOG
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\]" { capture = 1; next }
            capture && /^## \[/    { exit }
            capture                { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "::error::No CHANGELOG.md section found for version $version" >&2
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: dist/*.vsix
          prerelease: ${{ needs.channel.outputs.prerelease }}
          body_path: release-notes.md
