name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-native:
    name: Build native (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: fieldglass.linux-x64-gnu.node
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: fieldglass.linux-arm64-gnu.node
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: fieldglass.win32-x64-msvc.node
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            artifact: fieldglass.win32-arm64-msvc.node
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: fieldglass.darwin-x64.node
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: fieldglass.darwin-arm64.node

    steps:
      - uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install aarch64 Linux cross-linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install napi-rs CLI
        run: npm ci

      - name: Build native module
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: npx napi build --platform --release --target ${{ matrix.target }} --output-dir ${{ github.workspace }}/extension/bin
        working-directory: crates/fieldglass-napi

      - name: Upload native artifact
        uses: actions/upload-artifact@v7
        with:
          name: native-${{ matrix.target }}
          path: extension/bin/${{ matrix.artifact }}
          if-no-files-found: error

  package:
    name: Package .vsix
    needs: build-native
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Download all native artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: native-*
          path: extension/bin
          merge-multiple: true

      - name: Install extension dependencies
        run: npm ci
        working-directory: extension

      - name: Compile TypeScript
        run: npm run compile
        working-directory: extension

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Package extension
        run: vsce package --no-dependencies
        working-directory: extension

      - name: Upload .vsix
        uses: actions/upload-artifact@v7
        with:
          name: fieldglass-vsix
          path: extension/*.vsix

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: extension/*.vsix
