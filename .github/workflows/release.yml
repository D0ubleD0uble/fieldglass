name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    # Manual trigger for dry-run smoke tests of the build + package matrix.
    # The publish + GitHub Release jobs are gated on a tag ref, so manual
    # runs build artefacts and stop short of touching the Marketplace.

permissions:
  contents: read

jobs:
  build-native:
    name: Build native (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: fieldglass.linux-x64-gnu.node
            vsce_target: linux-x64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: fieldglass.linux-arm64-gnu.node
            vsce_target: linux-arm64
          - os: windows-2025-vs2026
            target: x86_64-pc-windows-msvc
            artifact: fieldglass.win32-x64-msvc.node
            vsce_target: win32-x64
          - os: windows-2025-vs2026
            target: aarch64-pc-windows-msvc
            artifact: fieldglass.win32-arm64-msvc.node
            vsce_target: win32-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: fieldglass.darwin-x64.node
            vsce_target: darwin-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: fieldglass.darwin-arm64.node
            vsce_target: darwin-arm64

    steps:
      - uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install aarch64 Linux cross-linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install napi-rs CLI
        run: npm ci

      - name: Build native module
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: npx napi build --platform --release --target ${{ matrix.target }} --output-dir ${{ github.workspace }}/extension/bin
        working-directory: crates/fieldglass-napi

      - name: Upload native artifact
        uses: actions/upload-artifact@v7
        with:
          name: native-${{ matrix.vsce_target }}
          path: extension/bin/${{ matrix.artifact }}
          if-no-files-found: error

  package:
    name: Package .vsix (${{ matrix.vsce_target }})
    needs: build-native
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        vsce_target:
          - linux-x64
          - linux-arm64
          - win32-x64
          - win32-arm64
          - darwin-x64
          - darwin-arm64
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Download native artifact for this target
        uses: actions/download-artifact@v8
        with:
          name: native-${{ matrix.vsce_target }}
          path: extension/bin

      - name: Install extension dependencies
        run: npm ci
        working-directory: extension

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Package extension (--target ${{ matrix.vsce_target }} --pre-release)
        run: |
          mkdir -p ${{ github.workspace }}/dist
          vsce package \
            --target ${{ matrix.vsce_target }} \
            --pre-release \
            --no-dependencies \
            --out ${{ github.workspace }}/dist/
        working-directory: extension

      - name: Upload .vsix
        uses: actions/upload-artifact@v7
        with:
          name: vsix-${{ matrix.vsce_target }}
          path: dist/*.vsix
          if-no-files-found: error

  publish:
    name: Publish to Marketplace + GitHub Release
    needs: package
    # Manual workflow_dispatch runs only build+package (dry run); only pushed
    # tags trigger the actual publish + release.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Download all .vsix artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: vsix-*
          path: dist
          merge-multiple: true

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Publish to VS Marketplace (pre-release channel)
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          set -euo pipefail
          args=()
          for vsix in dist/*.vsix; do
            args+=(--packagePath "$vsix")
          done
          vsce publish --pre-release "${args[@]}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*.vsix
          prerelease: true
          generate_release_notes: true
