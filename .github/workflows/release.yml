name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    # Manual trigger for dry-run smoke tests of the build + package matrix.
    # The publish + GitHub Release jobs are gated on a tag ref, so manual
    # runs build artefacts and stop short of touching the Marketplace.

# Every tag is a stable release. The extension publishes to the Marketplace's
# stable channel and the library crates go to crates.io, both from the same tag.
#
# There is no pre-release channel. The Marketplace has one version sequence
# shared by both channels and each version can only be published once, so
# routing pre-releases automatically means encoding the channel in the version
# number (the odd/even-minor convention). That makes the minor digit a channel
# bit rather than a semantic one, which fights crates.io — where cargo reads
# semver strictly. Plain semver won instead. If a soak build is ever wanted,
# `vsce publish --pre-release` is a per-publish flag: publish one version with
# it, the next without.

permissions:
  contents: read

jobs:
  build-native:
    name: Build native (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: fieldglass.linux-x64-gnu.node
            vsce_target: linux-x64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: fieldglass.linux-arm64-gnu.node
            vsce_target: linux-arm64
          - os: windows-2025-vs2026
            target: x86_64-pc-windows-msvc
            artifact: fieldglass.win32-x64-msvc.node
            vsce_target: win32-x64
          - os: windows-2025-vs2026
            target: aarch64-pc-windows-msvc
            artifact: fieldglass.win32-arm64-msvc.node
            vsce_target: win32-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: fieldglass.darwin-x64.node
            vsce_target: darwin-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: fieldglass.darwin-arm64.node
            vsce_target: darwin-arm64

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Cache cargo build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: ${{ matrix.target }}

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install aarch64 Linux cross-linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install napi-rs CLI
        run: npm ci

      - name: Build native module
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: npx napi build --platform --release --target ${{ matrix.target }} --output-dir ${{ github.workspace }}/extension/bin
        working-directory: crates/fieldglass-napi

      - name: Upload native artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: native-${{ matrix.vsce_target }}
          path: extension/bin/${{ matrix.artifact }}
          if-no-files-found: error

  package:
    name: Package .vsix (${{ matrix.vsce_target }})
    needs: [build-native]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        vsce_target:
          - linux-x64
          - linux-arm64
          - win32-x64
          - win32-arm64
          - darwin-x64
          - darwin-arm64
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Download native artifact for this target
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: native-${{ matrix.vsce_target }}
          path: extension/bin

      - name: Install extension dependencies
        run: npm ci
        working-directory: extension

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Package extension (--target ${{ matrix.vsce_target }})
        run: |
          mkdir -p ${{ github.workspace }}/dist
          vsce package \
            --target ${{ matrix.vsce_target }} \
            --no-dependencies \
            --out ${{ github.workspace }}/dist/
        working-directory: extension

      - name: Upload .vsix
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vsix-${{ matrix.vsce_target }}
          path: dist/*.vsix
          if-no-files-found: error

  publish:
    name: Publish to Marketplace + GitHub Release
    needs: [package]
    # Manual workflow_dispatch runs only build+package (dry run); only pushed
    # tags trigger the actual publish + release.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Download all .vsix artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: vsix-*
          path: dist
          merge-multiple: true

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Publish to VS Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          set -euo pipefail
          args=()
          for vsix in dist/*.vsix; do
            args+=(--packagePath "$vsix")
          done
          vsce publish "${args[@]}"

      # Use the curated CHANGELOG section for this version as the release body,
      # not GitHub's auto-generated commit list. The tag is vX.Y.Z; the
      # matching heading is "## [X.Y.Z]".
      - name: Extract release notes from CHANGELOG
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\]" { capture = 1; next }
            capture && /^## \[/    { exit }
            capture                { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "::error::No CHANGELOG.md section found for version $version" >&2
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: dist/*.vsix
          prerelease: false
          body_path: release-notes.md

  publish-crates:
    name: Publish library crates to crates.io
    needs: [package]
    # Every tag is a release, so every tag publishes the crates. A
    # workflow_dispatch dry run has no tag, so it skips this job and keeps its
    # no-side-effects property.
    #
    # Gated on `package` so the crates only go out if every native target built:
    # a version on crates.io cannot be taken back, only yanked.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Trusted Publishing exchanges this OIDC token for a short-lived registry
      # token, so no long-lived crates.io secret is stored in the repo.
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable

      - name: Check the tag matches the workspace version
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          crate_version="$(cargo metadata --format-version 1 --no-deps \
            | jq -r '.packages[] | select(.name == "fieldglass-core") | .version')"
          if [ "$tag_version" != "$crate_version" ]; then
            echo "::error::tag ${GITHUB_REF_NAME} does not match the workspace version ${crate_version}" >&2
            exit 1
          fi
          echo "Publishing version ${crate_version}"

      - name: Authenticate to crates.io (Trusted Publishing)
        id: auth
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5

      - name: Publish the library crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"

          # Is this exact version already on crates.io? A release re-run after a
          # partial failure must skip what already went out — `cargo publish`
          # errors on an existing version, which would otherwise fail the job.
          # Queried against the sparse index, whose path layout is fixed by name
          # length (crates.io: 1, 2, 3/x, then xx/yy).
          published() {
            local name="$1" want="$2" path body
            case ${#name} in
              1) path="1/${name}" ;;
              2) path="2/${name}" ;;
              3) path="3/${name:0:1}/${name}" ;;
              *) path="${name:0:2}/${name:2:2}/${name}" ;;
            esac
            # A 404 means the crate has never been published, so neither has this
            # version. Any other failure is treated the same way: attempt the
            # publish and let cargo be the authority.
            body="$(curl -sfL "https://index.crates.io/${path}")" || return 1
            grep -q "\"vers\":\"${want}\"" <<<"$body"
          }

          # `fieldglass-core` first: the format crates pin it with `=`, so they
          # cannot even be packaged until it is in the index. `cargo publish`
          # waits for each upload to propagate before returning, so the next
          # crate in the list resolves the one before it.
          for crate in fieldglass-core fieldglass-grib1 fieldglass-grib2 fieldglass-netcdf; do
            if published "$crate" "$version"; then
              echo "${crate} ${version} is already on crates.io — skipping"
              continue
            fi
            echo "Publishing ${crate} ${version}"
            cargo publish -p "$crate"
          done
