# Dependabot config — automatic dep update PRs.
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Grouping: each ecosystem collapses its weekly minor/patch bumps into a small
# number of grouped PRs (dev vs prod) instead of one PR per dependency. This
# cuts the rebase churn that branch protection's "up to date" rule otherwise
# forces on every wave, and keeps version-locked package sets (e.g. the
# typescript-eslint plugin + parser) in a single PR so they never conflict on
# the shared lockfile. Major bumps are intentionally left out of the groups so
# they arrive as individual PRs for deliberate review.
version: 2

updates:
  # Rust workspace.
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5
    labels: [dependencies, rust]
    groups:
      cargo-prod:
        dependency-type: production
        update-types: [minor, patch]
      cargo-dev:
        dependency-type: development
        update-types: [minor, patch]

  # VS Code extension (TypeScript / Node.js).
  - package-ecosystem: npm
    directory: /extension
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5
    labels: [dependencies, javascript]
    groups:
      npm-extension-prod:
        dependency-type: production
        update-types: [minor, patch]
      npm-extension-dev:
        dependency-type: development
        update-types: [minor, patch]
    ignore:
      # @types/vscode pins the API surface to the engines.vscode floor.
      # Bumping it without bumping engines.vscode in lockstep would expose
      # APIs that don't exist on users' runtime VS Code; doing both raises
      # the minimum supported VS Code, which is a deliberate decision, not
      # a Dependabot one. Skip these bumps and revisit manually.
      - dependency-name: "@types/vscode"
      # TypeScript 7.0 is the native (Go) compiler rewrite, not an incremental
      # release. typescript-eslint's type-aware rules reach into the compiler's
      # internal API and crash at runtime on TS 7 ("Cannot read properties of
      # undefined (reading 'Cjs')"); its supported range is still >=4.8.4
      # <6.1.0, and the support issue was closed as not planned
      # (typescript-eslint/typescript-eslint#12518). Keep taking 6.x minor and
      # patch bumps; revisit the major deliberately once the lint toolchain
      # ships TS 7 support (it must move in lockstep with @typescript-eslint/*).
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  # Root package.json (only @napi-rs/cli).
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    open-pull-requests-limit: 3
    labels: [dependencies, javascript]
    groups:
      npm-root-dev:
        dependency-type: development
        update-types: [minor, patch]

  # GitHub Actions workflows themselves.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5
    labels: [dependencies, github-actions]
    groups:
      github-actions:
        patterns: ["*"]
        update-types: [minor, patch]
