# Dependabot config — automatic dep update PRs.
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2

updates:
  # Rust workspace.
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: [dependencies, rust]

  # VS Code extension (TypeScript / Node.js).
  - package-ecosystem: npm
    directory: /extension
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: [dependencies, javascript]
    ignore:
      # @types/vscode pins the API surface to the engines.vscode floor.
      # Bumping it without bumping engines.vscode in lockstep would expose
      # APIs that don't exist on users' runtime VS Code; doing both raises
      # the minimum supported VS Code, which is a deliberate decision, not
      # a Dependabot one. Skip these bumps and revisit manually.
      - dependency-name: "@types/vscode"

  # Root package.json (only @napi-rs/cli).
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    labels: [dependencies, javascript]

  # GitHub Actions workflows themselves.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: [dependencies, github-actions]
